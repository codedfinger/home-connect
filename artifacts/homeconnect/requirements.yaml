packages:
  "framer-motion": "For elegant page transitions and micro-interactions"
  "date-fns": "For formatting human-readable timestamps on enquiries and properties"
  "react-hook-form": "For performant and accessible form state management"
  "@hookform/resolvers": "For Zod schema validation within forms"
  "lucide-react": "For beautiful consistent icons across the app"

images:
  - path: "artifacts/homeconnect/public/images/hero-bg.png"
    description: "Modern luxurious home exterior, warm natural lighting, bright and airy, architectural photography, subtle teal and emerald accents, extremely high quality, soft shadows"
    aspect_ratio: "16:9"
  - path: "artifacts/homeconnect/public/images/auth-bg.png"
    description: "Abstract soft gradient background with teal and emerald tones, elegant, minimal, glassmorphism elements, premium real estate branding"
    aspect_ratio: "16:9"
  - path: "artifacts/homeconnect/public/images/logo-icon.png"
    description: "Minimalist geometric house icon combined with a checkmark shield, teal and dark blue gradient, transparent background, premium app logo"
    aspect_ratio: "1:1"

notes:
  - API client hooks are imported from @workspace/api-client-react
  - Auth uses @workspace/replit-auth-web
  - Form validation relies on local Zod schemas matching the API request bodies
